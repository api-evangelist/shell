description: Shell's developer / API catalog (B2B Mobility, Card Management, Loyalty, etc.) is gated
  to existing Shell B2B partners. The API portal requires authentication and partner onboarding through
  api@shell.com or the Shell sales contact form. No public pricing, plan tiers, or rate-limit numbers
  are published; commercial terms are negotiated as part of the underlying B2B relationship (fuel-card
  contract, loyalty programme, etc.).
sources:
