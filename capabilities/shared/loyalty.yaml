naftiko: "1.0.0-alpha1"

info:
  label: "Shell Loyalty API"
  description: "Shell Go+ loyalty program API for account management, points balance, rewards catalogue, and offers"
  tags:
    - Loyalty
    - Points
    - Rewards
    - Retail
    - Energy
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SHELL_LOYALTY_TOKEN: SHELL_LOYALTY_TOKEN

capability:
  consumes:
    - type: http
      namespace: shell-loyalty
      baseUri: https://api.shell.com/loyalty/v1
      description: "Shell Go+ loyalty program API"
      authentication:
        type: bearer
        token: "{{SHELL_LOYALTY_TOKEN}}"
      resources:
        - name: accounts
          path: /accounts
          description: "Manage loyalty accounts"
          operations:
            - name: enroll-account
              method: POST
              description: "Enroll a new loyalty account"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  firstName: "{{tools.first_name}}"
                  lastName: "{{tools.last_name}}"
                  email: "{{tools.email}}"
                  countryCode: "{{tools.country_code}}"
            - name: get-account
              method: GET
              description: "Get loyalty account details"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                  description: "Loyalty account ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-points-balance
              method: GET
              description: "Get loyalty points balance for an account"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                  description: "Loyalty account ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: redeem-points
              method: POST
              description: "Redeem loyalty points for a reward"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  rewardId: "{{tools.reward_id}}"
                  pointsToRedeem: "{{tools.points_to_redeem}}"
            - name: list-loyalty-transactions
              method: GET
              description: "Get loyalty transaction history for an account"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                  description: "Loyalty account ID"
                - name: fromDate
                  in: query
                  type: string
                  required: false
                  description: "Start date filter"
                - name: toDate
                  in: query
                  type: string
                  required: false
                  description: "End date filter"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: catalogue
          path: /catalogue
          description: "Browse loyalty rewards catalogue"
          operations:
            - name: list-catalogue
              method: GET
              description: "List available loyalty rewards"
              inputParameters:
                - name: category
                  in: query
                  type: string
                  required: false
                  description: "Filter by reward category"
                - name: countryCode
                  in: query
                  type: string
                  required: false
                  description: "Filter by country"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: offers
          path: /accounts/{accountId}/offers
          description: "Manage loyalty offers"
          operations:
            - name: list-offers
              method: GET
              description: "List available offers for a loyalty account"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                  description: "Loyalty account ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8103
      namespace: shell-loyalty-rest
      resources:
        - path: /v1/loyalty-accounts
          name: loyalty-accounts
          description: "Manage loyalty accounts"
          operations:
            - method: POST
              name: enroll-account
              description: "Enroll loyalty account"
              call: "shell-loyalty.enroll-account"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/loyalty-accounts/{id}/balance
          name: points-balance
          description: "Get points balance"
          operations:
            - method: GET
              name: get-points-balance
              description: "Get points balance"
              call: "shell-loyalty.get-points-balance"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/rewards
          name: rewards
          description: "Browse rewards catalogue"
          operations:
            - method: GET
              name: list-rewards
              description: "List rewards"
              call: "shell-loyalty.list-catalogue"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9103
      namespace: shell-loyalty-mcp
      transport: http
      tools:
        - name: enroll-loyalty-account
          description: "Enroll a new customer in Shell Go+ loyalty program"
          hints:
            readOnly: false
          call: "shell-loyalty.enroll-account"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-loyalty-account
          description: "Get Shell Go+ loyalty account details"
          hints:
            readOnly: true
          call: "shell-loyalty.get-account"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-points-balance
          description: "Get current loyalty points balance for an account"
          hints:
            readOnly: true
          call: "shell-loyalty.get-points-balance"
          outputParameters:
            - type: object
              mapping: "$."
        - name: redeem-points
          description: "Redeem loyalty points for a reward"
          hints:
            readOnly: false
          call: "shell-loyalty.redeem-points"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-rewards-catalogue
          description: "Browse available rewards in Shell loyalty catalogue"
          hints:
            readOnly: true
            openWorld: true
          call: "shell-loyalty.list-catalogue"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-loyalty-transactions
          description: "Get loyalty earn and redeem transaction history"
          hints:
            readOnly: true
          call: "shell-loyalty.list-loyalty-transactions"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-account-offers
          description: "List available offers for a loyalty account"
          hints:
            readOnly: true
          call: "shell-loyalty.list-offers"
          outputParameters:
            - type: object
              mapping: "$."
