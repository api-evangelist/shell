naftiko: 1.0.0-alpha2
info:
  label: Shell Lubricants API — Products
  description: 'Shell Lubricants API — Products. 2 operations. Lead operation: List Products. Self-contained Naftiko capability
    covering one Shell business surface.'
  tags:
  - Shell
  - Products
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SHELL_API_KEY: SHELL_API_KEY
capability:
  consumes:
  - type: http
    namespace: lubricants-products
    baseUri: https://api.shell.com/lubricants/v1
    description: Shell Lubricants API — Products business capability. Self-contained, no shared references.
    resources:
    - name: products
      path: /products
      operations:
      - name: listproducts
        method: GET
        description: List Products
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: category
          in: query
          type: string
          description: Filter by product category (engine oil, gear oil, hydraulic, etc.)
        - name: application
          in: query
          type: string
          description: Filter by application type
        - name: page
          in: query
          type: integer
        - name: pageSize
          in: query
          type: integer
    - name: products-productId
      path: /products/{productId}
      operations:
      - name: getproduct
        method: GET
        description: Get Product
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: productId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.SHELL_API_KEY}}'
  exposes:
  - type: rest
    namespace: lubricants-products-rest
    port: 8080
    description: REST adapter for Shell Lubricants API — Products. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/products
      name: products
      description: REST surface for products.
      operations:
      - method: GET
        name: listproducts
        description: List Products
        call: lubricants-products.listproducts
        with:
          category: rest.category
          application: rest.application
          page: rest.page
          pageSize: rest.pageSize
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/products/{productid}
      name: products-productid
      description: REST surface for products-productId.
      operations:
      - method: GET
        name: getproduct
        description: Get Product
        call: lubricants-products.getproduct
        with:
          productId: rest.productId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: lubricants-products-mcp
    port: 9090
    transport: http
    description: MCP adapter for Shell Lubricants API — Products. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-products
      description: List Products
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: lubricants-products.listproducts
      with:
        category: tools.category
        application: tools.application
        page: tools.page
        pageSize: tools.pageSize
      outputParameters:
      - type: object
        mapping: $.
    - name: get-product
      description: Get Product
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: lubricants-products.getproduct
      with:
        productId: tools.productId
      outputParameters:
      - type: object
        mapping: $.
