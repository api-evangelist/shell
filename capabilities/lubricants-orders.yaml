naftiko: 1.0.0-alpha2
info:
  label: Shell Lubricants API — Orders
  description: 'Shell Lubricants API — Orders. 3 operations. Lead operation: List Orders. Self-contained Naftiko capability
    covering one Shell business surface.'
  tags:
  - Shell
  - Orders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SHELL_API_KEY: SHELL_API_KEY
capability:
  consumes:
  - type: http
    namespace: lubricants-orders
    baseUri: https://api.shell.com/lubricants/v1
    description: Shell Lubricants API — Orders business capability. Self-contained, no shared references.
    resources:
    - name: orders
      path: /orders
      operations:
      - name: listorders
        method: GET
        description: List Orders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountNumber
          in: query
          type: string
          required: true
        - name: status
          in: query
          type: string
          description: Filter by order status
        - name: fromDate
          in: query
          type: string
        - name: toDate
          in: query
          type: string
        - name: page
          in: query
          type: integer
        - name: pageSize
          in: query
          type: integer
      - name: placeorder
        method: POST
        description: Place Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: orders-orderId
      path: /orders/{orderId}
      operations:
      - name: getorder
        method: GET
        description: Get Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orderId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.SHELL_API_KEY}}'
  exposes:
  - type: rest
    namespace: lubricants-orders-rest
    port: 8080
    description: REST adapter for Shell Lubricants API — Orders. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/orders
      name: orders
      description: REST surface for orders.
      operations:
      - method: GET
        name: listorders
        description: List Orders
        call: lubricants-orders.listorders
        with:
          accountNumber: rest.accountNumber
          status: rest.status
          fromDate: rest.fromDate
          toDate: rest.toDate
          page: rest.page
          pageSize: rest.pageSize
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: placeorder
        description: Place Order
        call: lubricants-orders.placeorder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders/{orderid}
      name: orders-orderid
      description: REST surface for orders-orderId.
      operations:
      - method: GET
        name: getorder
        description: Get Order
        call: lubricants-orders.getorder
        with:
          orderId: rest.orderId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: lubricants-orders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Shell Lubricants API — Orders. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-orders
      description: List Orders
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: lubricants-orders.listorders
      with:
        accountNumber: tools.accountNumber
        status: tools.status
        fromDate: tools.fromDate
        toDate: tools.toDate
        page: tools.page
        pageSize: tools.pageSize
      outputParameters:
      - type: object
        mapping: $.
    - name: place-order
      description: Place Order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: lubricants-orders.placeorder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-order
      description: Get Order
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: lubricants-orders.getorder
      with:
        orderId: tools.orderId
      outputParameters:
      - type: object
        mapping: $.
