specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Shell
providerId: shell
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Energy
  - Mobility
  - Fleet
  - Rate Limiting
description: Shell does not publish API rate limits in publicly accessible documentation. The Shell
  developer portal gates the full API catalog behind authentication and partner onboarding; specific
  thresholds are disclosed to provisioned partners through their account team.
sources:
  - https://developer.shell.com/api-catalog
notes: No public rate-limit documentation. Limits are partner-specific and disclosed under contract.
responseCodes:
  throttled: 429
limits:
  - name: Partner-specific throttling
    scope: partner
    metric: varies
    limit: see partner agreement
    notes: Specific thresholds disclosed only to provisioned B2B partners.
policies:
  - name: Partner onboarding required
    description: API access requires onboarding via api@shell.com; rate-limit details are issued as part
      of the technical onboarding package.
  - name: Backoff
    description: On 429 / 503 responses, back off and retry with exponential delay; honor Retry-After
      if returned.
  - name: Disclosure
    description: Numeric limits are not publicly documented and must be confirmed with the Shell account
      team.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
